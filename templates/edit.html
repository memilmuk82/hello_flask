<!DOCTYPE html>
<html>
<head>
<title>수정하기</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
	<h1 class="text-2xl font-bold mb-4">
		{{ index + 1 }}번째 데이터 수정 중	
	</h1>

	<form action="/update/{{ index }}" method="POST" class="space-y-3">
			<div>
				<label class="block mb-1 font-bold">기술명</label>
				<input
					type="text"
					name="skill"
					value="{{ item['skill'] }}"
					class="border px-3 py-2 rounded w-full"
				>
			</div>

			<div>
				<label class="block mb-1 font-bold">수준</label>
				<input
					type="text"
					name="level"
					value="{{ item['level'] }}"
					class="border px-3 py-2 rounded w-full"
				>
			</div>

			<div>
				<label class="block mb-1 font-bold">학습 상태</label>
				<input
					type="text"
					name="status"
					value="{{ item['status'] }}"
					class="border px-3 py-2 rounded w-full"
				>
			</div>

			<button
				type="submit"
				class="bg-green-500 text-white px-4 py-2 rounded"
			>
				수정 완료
			</button>
    </form>

	<a href="/" class="inline-block mt-4 text-blue-600">돌아가기</a>
	
</body>
</html>
