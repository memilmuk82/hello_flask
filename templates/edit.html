<!DOCTYPE html>
<html>
<head>
    <title>수정하기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8">
    <!--
        수정 화면 제목이다.
        기존에는 index + 1번째 데이터라고 표시했지만,
        이제는 id를 기준으로 표시한다.
    -->
    <h1 class="text-2xl font-bold mb-4">
        #{{ item["id"] }} 데이터 수정 중
    </h1>

    <!--
        수정 form이다.
        수정 완료 버튼을 누르면 /update/데이터id 주소로 POST 요청을 보낸다.
    -->
    <form action="/update/{{ item['id'] }}" method="POST" class="space-y-3">
        <div>
            <label class="block mb-1 font-bold">기술명</label>
            <input
                type="text"
                name="skill"
                value="{{ item['skill'] }}"
                class="border px-3 py-2 rounded w-full"
>
        </div>

        <div>
            <label class="block mb-1 font-bold">수준</label>
            <input
                type="text"
                name="level"
                value="{{ item['level'] }}"
                class="border px-3 py-2 rounded w-full"
>
        </div>

        <div>
            <label class="block mb-1 font-bold">학습 상태</label>
            <input
                type="text"
                name="status"
                value="{{ item['status'] }}"
                class="border px-3 py-2 rounded w-full"
>
        </div>

        <button
            type="submit"
            class="bg-green-500 text-white px-4 py-2 rounded"
>
            수정 완료
        </button>
    </form>

    <a href="/" class="inline-block mt-4 text-blue-600">돌아가기</a>
</body>
</html>
